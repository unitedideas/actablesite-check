name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm test
      - run: npm pack --dry-run
      - name: Run the local GitHub Action
        id: crawler-policy
        uses: ./
        with:
          website: example.com
          fail-on-blocked: "false"
      - name: Verify action outputs
        env:
          ALLOWED_COUNT: ${{ steps.crawler-policy.outputs.allowed-count }}
          BLOCKED_COUNT: ${{ steps.crawler-policy.outputs.blocked-count }}
        run: test "$((ALLOWED_COUNT + BLOCKED_COUNT))" -eq 8
